<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>긍정 언어 쌓기 🌟</title>
  <script src="https://cdn.jsdelivr.net/npm/phaser@3.60.0/dist/phaser.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;700;900&display=swap');
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #0d0d1a;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      font-family: 'Noto Sans KR', sans-serif;
      overflow: hidden;
    }
    #game-container { position: relative; width: 360px; height: 640px; }
    #result-overlay {
      display: none; position: absolute; inset: 0;
      background: linear-gradient(160deg, #0f0c29, #302b63, #24243e);
      flex-direction: column; align-items: center; justify-content: flex-start;
      padding: 28px 24px 20px; overflow-y: auto; z-index: 100;
    }
    #result-overlay.show { display: flex; }
    .result-star { font-size: 52px; margin-bottom: 6px; animation: starPop 0.6s ease; }
    @keyframes starPop {
      0% { transform: scale(0) rotate(-20deg); opacity: 0; }
      70% { transform: scale(1.2) rotate(5deg); }
      100% { transform: scale(1) rotate(0deg); opacity: 1; }
    }
    .result-title { font-size: 22px; font-weight: 900; color: #fff; margin-bottom: 4px; }
    .score-card { background: rgba(255,255,255,0.07); border: 1px solid rgba(255,255,255,0.15); border-radius: 18px; padding: 16px 40px; margin-bottom: 22px; text-align: center; }
    .score-value { font-size: 52px; font-weight: 900; background: linear-gradient(135deg, #ffd700, #ff9500); -webkit-background-clip: text; -webkit-text-fill-color: transparent; line-height: 1; }
    .form-input { width: 100%; background: rgba(255,255,255,0.08); border: 1.5px solid rgba(255,255,255,0.15); border-radius: 12px; padding: 12px 16px; color: #fff; margin-bottom: 14px; outline: none; }
    .btn-register { width: 100%; background: linear-gradient(135deg, #7c6fcd, #a855f7); border: none; border-radius: 14px; padding: 15px; font-size: 16px; font-weight: 700; color: #fff; cursor: pointer; margin-bottom: 12px; }
    .btn-replay { width: 100%; background: rgba(255,255,255,0.08); border: 1.5px solid rgba(255,255,255,0.2); border-radius: 14px; padding: 13px; color: #c9bfed; cursor: pointer; }
    #progress-bar { position: absolute; top: 0; left: 0; right: 0; height: 4px; background: rgba(255,255,255,0.1); z-index: 10; }
    #progress-fill { height: 100%; width: 100%; background: linear-gradient(90deg, #7c6fcd, #ff9500); transition: width 1s linear; }
    #start-overlay { position: absolute; inset: 0; background: linear-gradient(160deg, #0f0c29, #1a1040); display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 200; padding: 32px 28px; }
    .btn-start { width: 100%; background: linear-gradient(135deg, #7c6fcd, #a855f7); border: none; border-radius: 16px; padding: 17px; font-size: 18px; font-weight: 900; color: #fff; cursor: pointer; }
    .stars-bg { position: absolute; inset: 0; overflow: hidden; pointer-events: none; }
    .star-dot { position: absolute; background: #fff; border-radius: 50%; animation: twinkle var(--d) ease-in-out infinite; opacity: 0; }
    @keyframes twinkle { 0%, 100% { opacity: 0; } 50% { opacity: var(--o); } }
  </style>
</head>
<body>

<div id="game-container">
  <div id="progress-bar"><div id="progress-fill"></div></div>
  <div id="start-overlay">
    <div class="stars-bg" id="stars-bg"></div>
    <div class="start-emoji">✨</div>
    <h1 class="start-title">긍정 언어 쌓기<br><span>말씀 블록 챌린지</span></h1>
    <p style="color:#a89fcc; margin-bottom:20px; text-align:center;">60초 안에 긍정 단어를 모아보세요!</p>
    <button class="btn-start" onclick="startGame()">🎮 게임 시작!</button>
  </div>

  <div id="result-overlay">
    <div class="result-star">🏆</div>
    <div class="result-title">게임 종료!</div>
    <div class="score-card">
      <div class="score-value" id="final-score">0</div>
      <p style="color:#a89fcc;">점</p>
    </div>
    <input class="form-input" id="input-name" type="text" placeholder="이름을 입력해주세요" maxlength="10" />
    <input class="form-input" id="input-phone" type="tel" placeholder="010-0000-0000" maxlength="13" />
    <div class="status-msg" id="status-msg"></div>
    <button class="btn-register" id="btn-register" onclick="submitScore()">🏅 랭킹 등록하기</button>
    <button class="btn-replay" onclick="replayGame()">🔄 다시 도전하기</button>
    <div class="leaderboard-wrap" id="leaderboard-wrap" style="display:none; margin-top:20px;">
      <div id="leaderboard-list"></div>
    </div>
  </div>
</div>

<script>
// Supabase 설정
const SUPABASE_URL = 'https://eossslutugsfmeovpfet.supabase.co';
const SUPABASE_KEY = 'sb_publishable_oshufwYVp05nC7S9wfo6rA_M7nZx91H';
const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

// 별 배경 생성
(function createStars() {
  const bg = document.getElementById('stars-bg');
  if(!bg) return;
  for (let i = 0; i < 60; i++) {
    const el = document.createElement('div');
    el.className = 'star-dot';
    const size = Math.random() * 2.5 + 0.5;
    el.style.cssText = `width:${size}px; height:${size}px; left:${Math.random()*100}%; top:${Math.random()*100}%; --d:${(Math.random()*3+1.5).toFixed(1)}s; --o:${(Math.random()*0.7+0.2).toFixed(2)}; animation-delay:${(Math.random()*3).toFixed(1)}s;`;
    bg.appendChild(el);
  }
})();

// 전화번호 포맷팅
document.getElementById('input-phone').addEventListener('input', function() {
  let v = this.value.replace(/\D/g, '');
  if (v.length > 11) v = v.slice(0, 11);
  if (v.length > 7) this.value = v.slice(0,3)+'-'+v.slice(3,7)+'-'+v.slice(7);
  else if (v.length > 3) this.value = v.slice(0,3)+'-'+v.slice(3);
  else this.value = v;
});

let phaserGame = null;
let finalScore = 0;

// Phaser 초기화
function initPhaser() {
  if (phaserGame) return;
  const config = {
    type: Phaser.CANVAS, 
    width: 360,
    height: 640,
    parent: 'game-container',
    backgroundColor: '#0d0d1a',
    physics: {
      default: 'arcade',
      arcade: { debug: false }
    },
    scene: [GameScene],
    scale: {
      mode: Phaser.Scale.FIT,
      autoCenter: Phaser.Scale.CENTER_BOTH
    }
  };
  
  setTimeout(() => {
    if (!phaserGame) {
      phaserGame = new Phaser.Game(config);
    }
  }, 100);
}

function startGame() {
  document.getElementById('start-overlay').style.display = 'none';
  setTimeout(() => {
    if (!phaserGame) initPhaser();
    else restartGame();
  }, 150);
}

function replayGame() {
  document.getElementById('result-overlay').classList.remove('show');
  document.getElementById('status-msg').textContent = '';
  document.getElementById('btn-register').disabled = false;
  restartGame();
}

function restartGame() {
  if (phaserGame) {
    const scene = phaserGame.scene.getScene('GameScene');
    if (scene) scene.scene.restart();
    document.getElementById('progress-fill').style.width = '100%';
  }
}

async function submitScore() {
  const name = document.getElementById('input-name').value.trim();
  const phone = document.getElementById('input-phone').value.trim();
  if (!name || !phone) { showMsg('정보를 입력해주세요.', true); return; }
  
  const btn = document.getElementById('btn-register');
  btn.disabled = true;
  btn.textContent = '등록 중...';

  try {
    const { error } = await supabaseClient.from('ranking').insert([{ username: name, score: finalScore, phone }]);
    if (error) throw error;
    showMsg('🎉 랭킹 등록 성공!', false);
    btn.textContent = '✅ 등록 완료';
    await loadLeaderboard();
  } catch (err) {
    showMsg('등록 실패. 다시 시도해주세요.', true);
    btn.disabled = false;
    btn.textContent = '🏅 랭킹 등록하기';
  }
}

async function loadLeaderboard() {
  try {
    const { data } = await supabaseClient.from('ranking').select('username, score').order('score', { ascending: false }).limit(10);
    const wrap = document.getElementById('leaderboard-wrap');
    const list = document.getElementById('leaderboard-list');
    wrap.style.display = 'block';
    list.innerHTML = data.map((row, i) => `
      <div style="display:flex; justify-content:space-between; padding:8px 16px; border-bottom:1px solid rgba(255,255,255,0.1);">
        <span style="color:#ffd700; font-weight:bold;">${i+1}위</span>
        <span style="color:#fff;">${escapeHtml(row.username)}</span>
        <span style="color:#ffd700;">${row.score}점</span>
      </div>
    `).join('');
  } catch (e) {
    console.error(e);
  }
}

function showMsg(text, isError) {
  const el = document.getElementById('status-msg');
  el.textContent = text;
  el.style.color = isError ? '#ff7f9f' : '#7fffb0';
}

function escapeHtml(str) {
  if(!str) return "";
  return str.replace(/[&<>"']/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":"&#39;"}[m]));
}

// 게임 씬 정의
class GameScene extends Phaser.Scene {
  constructor() { super({ key: 'GameScene' }); }
  
  create() {
    this.basket = this.add.rectangle(180, 580, 80, 40, 0x7c6fcd).setStrokeStyle(2, 0xffffff);
    this.physics.add.existing(this.basket, true);
    this.blocks = this.physics.add.group();
    
    this.score = 0;
    this.timeLeft = 60;
    this.gameOver = false;
    
    this.scoreTxt = this.add.text(20, 20, '점수: 0', { fontSize: '20px', fontWeight: 'bold', fill: '#fff' });
    this.timerTxt = this.add.text(270, 20, '60초', { fontSize: '20px', fontWeight: 'bold', fill: '#ffd700' });
    
    this.input.on('pointermove', p => {
      if(!this.gameOver) this.basket.x = Phaser.Math.Clamp(p.x, 40, 320);
    });
    
    this.time.addEvent({ delay: 1000, callback: this.spawnBlock, callbackScope: this, loop: true });
    this.time.addEvent({ delay: 1000, callback: this.tick, callbackScope: this, loop: true });
  }

  spawnBlock() {
    if (this.gameOver) return;
    const isPos = Math.random() > 0.4;
    const words = isPos ? ['감사','사랑','격려','소망'] : ['비난','포기','짜증','뒷담'];
    const word = words[Math.floor(Math.random()*words.length)];
    const x = Math.random() * 280 + 40;
    
    const container = this.add.container(x, -20);
    const rect = this.add.rectangle(0, 0, 70, 35, isPos ? 0x2ecc71 : 0xe74c3c).setStrokeStyle(2, 0xffffff);
    const txt = this.add.text(0, 0, word, { fontSize: '15px', fontWeight: 'bold', fill: '#fff' }).setOrigin(0.5);
    
    container.add([rect, txt]);
    this.physics.world.enable(container);
    container.body.setVelocityY(200 + (60 - this.timeLeft) * 2);
    this.blocks.add(container);

    this.physics.add.overlap(this.basket, container, () => {
      this.score += isPos ? 10 : -5;
      if(this.score < 0) this.score = 0;
      this.scoreTxt.setText(`점수: ${this.score}`);
      container.destroy();
    });
  }

  tick() {
    if (this.gameOver) return;
    this.timeLeft--;
    this.timerTxt.setText(`${this.timeLeft}초`);
    document.getElementById('progress-fill').style.width = (this.timeLeft/60*100)+'%';
    if (this.timeLeft <= 0) this.endGame();
  }

  endGame() {
    this.gameOver = true;
    this.physics.pause();
    finalScore = this.score;
    
    document.getElementById('final-score').textContent = this.score;
    document.getElementById('result-overlay').classList.add('show');
  }
}
</script>
</body>
</html>
