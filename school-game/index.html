<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>긍정 언어 쌓기 🌟</title>
  <meta property="og:title" content="✨ 긍정 언어 쌓기 챌린지" />
  <meta property="og:description" content="우리 입술에 긍정의 말을 채워요! 말씀 블록 60초 챌린지 🏆 순위 상품 증정 예정" />
  <meta property="og:image" content="https://images.unsplash.com/photo-1614850523296-d8c1af93d400?q=80&w=1000&auto=format&fit=crop" />
  <meta property="og:url" content="https://school-game-q4dw.vercel.app" />
  <meta property="og:type" content="website" />
  <script src="https://cdn.jsdelivr.net/npm/phaser@3.60.0/dist/phaser.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;700;900&display=swap');
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #0d0d1a; display: flex; justify-content: center; align-items: center; min-height: 100vh; font-family: 'Noto Sans KR', sans-serif; overflow: hidden; }
    #game-container { position: relative; width: 360px; height: 640px; }
    #result-overlay { display: none; position: absolute; inset: 0; background: linear-gradient(160deg, #0f0c29, #302b63, #24243e); flex-direction: column; align-items: center; justify-content: flex-start; padding: 28px 24px 20px; overflow-y: auto; z-index: 100; }
    #result-overlay.show { display: flex; }
    .result-star { font-size: 52px; margin-bottom: 6px; animation: starPop 0.6s ease; }
    @keyframes starPop { 0%{transform:scale(0) rotate(-20deg);opacity:0} 70%{transform:scale(1.2) rotate(5deg)} 100%{transform:scale(1) rotate(0);opacity:1} }
    .result-title { font-size: 22px; font-weight: 900; color: #fff; margin-bottom: 4px; }
    .score-card { background: rgba(255,255,255,0.07); border: 1px solid rgba(255,255,255,0.15); border-radius: 18px; padding: 16px 40px; margin-bottom: 22px; text-align: center; }
    .score-value { font-size: 52px; font-weight: 900; background: linear-gradient(135deg, #ffd700, #ff9500); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; line-height: 1; }
    .form-input { width: 100%; background: rgba(255,255,255,0.08); border: 1.5px solid rgba(255,255,255,0.15); border-radius: 12px; padding: 12px 16px; font-size: 15px; color: #fff; margin-bottom: 14px; outline: none; }
    .btn-register { width: 100%; background: linear-gradient(135deg, #7c6fcd, #a855f7); border: none; border-radius: 14px; padding: 15px; font-size: 16px; font-weight: 700; color: #fff; cursor: pointer; margin-bottom: 12px; }
    .btn-replay { width: 100%; background: rgba(255,255,255,0.08); border: 1.5px solid rgba(255,255,255,0.2); border-radius: 14px; padding: 13px; font-size: 15px; font-weight: 700; color: #c9bfed; cursor: pointer; }
    .status-msg { font-size: 13px; text-align: center; margin-bottom: 12px; font-weight: 700; }
    #progress-bar { position: absolute; top: 0; left: 0; right: 0; height: 4px; background: rgba(255,255,255,0.1); z-index: 10; }
    #progress-fill { height: 100%; background: linear-gradient(90deg, #7c6fcd, #ff9500); transition: width 1s linear; width: 100%; }
    #start-overlay { position: absolute; inset: 0; background: linear-gradient(160deg, #0f0c29, #1a1040); display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 200; padding: 32px 28px; }
    .start-emoji { font-size: 72px; margin-bottom: 12px; animation: float 3s ease-in-out infinite; }
    @keyframes float { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-12px)} }
    .start-title { font-size: 26px; font-weight: 900; color: #fff; text-align: center; margin-bottom: 8px; }
    .start-title span { background: linear-gradient(135deg, #ffd700, #ff9500); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; }
    .btn-start { width: 100%; background: linear-gradient(135deg, #7c6fcd, #a855f7); border: none; border-radius: 16px; padding: 17px; font-size: 18px; font-weight: 900; color: #fff; cursor: pointer; }
    .stars-bg { position: absolute; inset: 0; overflow: hidden; pointer-events: none; }
    .star-dot { position: absolute; background: #fff; border-radius: 50%; animation: twinkle var(--d) ease-in-out infinite; opacity: 0; }
    @keyframes twinkle { 0%,100%{opacity:0} 50%{opacity:var(--o)} }
    .leaderboard-wrap { width: 100%; background: rgba(255,255,255,0.05); border-radius: 16px; margin-top: 10px; }
    .lb-row { display: grid; grid-template-columns: 32px 1fr auto; padding: 10px 16px; color: #fff; border-bottom: 1px solid rgba(255,255,255,0.06); }
  </style>
</head>
<body>
<div id="game-container">
  <div id="progress-bar"><div id="progress-fill"></div></div>
  <div id="start-overlay">
    <div class="stars-bg" id="stars-bg"></div>
    <div class="start-emoji">✨</div>
    <div class="start-title">긍정 언어 쌓기<br><span>말씀 블록 챌린지</span></div>
    <p style="color:#a89fcc; text-align:center; margin-bottom:28px; font-size:13px;">카카오 로그인 후 60초 챌린지에 도전하세요! 🏆</p>
    <button class="btn-start" onclick="startGame()">🎮 게임 시작!</button>
  </div>
  <div id="result-overlay">
    <div class="result-star">🏆</div>
    <div class="result-title">게임 종료!</div>
    <div class="score-card">
      <div class="score-value" id="final-score">0</div>
      <div style="color:#a89fcc;">점</div>
    </div>
    <div class="status-msg" id="status-msg"></div>
    <button class="btn-register" id="btn-register" onclick="submitScore()">🏅 랭킹 등록하기</button>
    <button class="btn-replay" onclick="replayGame()">🔄 다시 도전하기</button>
    <div class="leaderboard-wrap" id="leaderboard-wrap" style="display:none;">
      <div id="leaderboard-list"></div>
    </div>
  </div>
</div>

<script>
  // ── 1. 초기화 ──
  const SUPABASE_URL = 'https://eossslutugsfmeovpfet.supabase.co';
  const SUPABASE_KEY = 'sb_publishable_oshufwYVp05nC7S9wfo6rA_M7nZx91H';
  const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

  let phaserGame = null;
  let finalScore = 0;

  // ── 2. 배경 별 생성 ──
  (function createStars() {
    const bg = document.getElementById('stars-bg');
    for (let i = 0; i < 50; i++) {
      const el = document.createElement('div');
      el.className = 'star-dot';
      const size = Math.random() * 2 + 1;
      el.style.cssText = `width:${size}px;height:${size}px;left:${Math.random()*100}%;top:${Math.random()*100}%;--d:${(Math.random()*3+1).toFixed(1)}s;--o:${Math.random().toFixed(2)};animation-delay:${Math.random()*3}s;`;
      bg.appendChild(el);
    }
  })();

  // ── 3. 카카오 로그인 로직 ──
  async function signInWithKakao() {
    const { error } = await supabaseClient.auth.signInWithOAuth({
      provider: 'kakao',
      options: { redirectTo: window.location.origin }
    });
    if (error) alert('로그인 에러: ' + error.message);
  }

  async function checkUser() {
    const { data: { session } } = await supabaseClient.auth.getSession();
    if (session) {
      const name = session.user.user_metadata.full_name || session.user.user_metadata.name || "익명";
      return { loggedIn: true, name: name };
    }
    return { loggedIn: false };
  }

  // ── 4. 게임 제어 ──
  async function startGame() {
    const user = await checkUser();
    if (!user.loggedIn) {
      alert('챌린지 참여를 위해 카카오 로그인이 필요합니다! ✨');
      await signInWithKakao();
      return;
    }
    document.getElementById('start-overlay').style.display = 'none';
    setTimeout(() => {
      if (!phaserGame) initPhaser();
      else restartGame();
    }, 150);
  }

  function initPhaser() {
    const config = {
      type: Phaser.CANVAS,
      width: 360, height: 640,
      parent: 'game-container',
      backgroundColor: '#0d0d1a',
      physics: { default: 'arcade', arcade: { debug: false } },
      scene: [GameScene],
      scale: { mode: Phaser.Scale.FIT, autoCenter: Phaser.Scale.CENTER_BOTH }
    };
    phaserGame = new Phaser.Game(config);
  }

  function restartGame() {
    const scene = phaserGame.scene.getScene('GameScene');
    if (scene) scene.scene.restart();
    document.getElementById('progress-fill').style.width = '100%';
  }

  function replayGame() {
    document.getElementById('result-overlay').classList.remove('show');
    document.getElementById('status-msg').textContent = '';
    document.getElementById('btn-register').disabled = false;
    restartGame();
  }

  // ── 5. 점수 등록 ──
  async function submitScore() {
    const user = await checkUser();
    if (!user.loggedIn) return;

    const btn = document.getElementById('btn-register');
    btn.disabled = true;
    btn.textContent = '등록 중...';

    try {
      const { error } = await supabaseClient.from('rankings').insert([{ 
        username: user.name, 
        score: finalScore,
        phone: 'KakaoUser'
      }]);
      if (error) throw error;
      showMsg(`🎉 ${user.name}님 등록 완료!`, false);
      await loadLeaderboard();
    } catch (err) {
      showMsg('실패했습니다.', true);
      btn.disabled = false;
    }
  }

  async function loadLeaderboard() {
    const { data } = await supabaseClient.from('rankings').select('username, score').order('score', { ascending: false }).limit(10);
    const wrap = document.getElementById('leaderboard-wrap');
    const list = document.getElementById('leaderboard-list');
    wrap.style.display = 'block';
    list.innerHTML = data.map((row, i) => `<div class="lb-row"><span>${i+1}위</span><span>${row.username}</span><span>${row.score}점</span></div>`).join('');
  }

  function showMsg(text, isError) {
    const el = document.getElementById('status-msg');
    el.textContent = text;
    el.style.color = isError ? '#ff7f9f' : '#7fffb0';
  }

  // ── 6. 게임 씬 ──
  class GameScene extends Phaser.Scene {
    constructor() { super({ key: 'GameScene' }); }
    create() {
      this.basket = this.add.rectangle(180, 580, 80, 36, 0x7c6fcd).setStrokeStyle(2, 0xffffff);
      this.physics.add.existing(this.basket, true);
      this.blocks = this.physics.add.group();
      this.score = 0; this.timeLeft = 60; this.gameOver = false;
      this.scoreTxt = this.add.text(20, 20, '점수: 0', { fontSize: '18px', fill: '#fff' });
      this.timerTxt = this.add.text(280, 20, '60초', { fontSize: '18px', fill: '#ffd700' });
      this.input.on('pointermove', p => { if(!this.gameOver) this.basket.x = Phaser.Math.Clamp(p.x, 40, 320); });
      this.time.addEvent({ delay: 1000, callback: this.spawnBlock, callbackScope: this, loop: true });
      this.time.addEvent({ delay: 1000, callback: this.tick, callbackScope: this, loop: true });
    }
    spawnBlock() {
      if (this.gameOver) return;
      const isPos = Math.random() > 0.45;
      const words = isPos ? ['감사','사랑','격려','소망'] : ['비난','포기','짜증','험담'];
      const x = Math.random() * 280 + 40;
      const container = this.add.container(x, -20);
      const rect = this.add.rectangle(0, 0, 64, 32, isPos ? 0x27ae60 : 0xc0392b).setStrokeStyle(1, 0xffffff);
      const txt = this.add.text(0, 0, words[Math.floor(Math.random()*4)], { fontSize: '14px', fill: '#fff' }).setOrigin(0.5);
      container.add([rect, txt]);
      this.physics.world.enable(container);
      container.body.setVelocityY(200 + (60 - this.timeLeft) * 2);
      this.physics.add.overlap(this.basket, container, () => {
        this.score += isPos ? 10 : -5;
        this.scoreTxt.setText(`점수: ${this.score}`);
        container.destroy();
      });
    }
    tick() {
      if (this.gameOver) return;
      this.timeLeft--;
      this.timerTxt.setText(`${this.timeLeft}초`);
      document.getElementById('progress-fill').style.width = (this.timeLeft/60*100)+'%';
      if (this.timeLeft <= 0) this.endGame();
    }
    endGame() {
      this.gameOver = true;
      finalScore = this.score;
      document.getElementById('final-score').textContent = finalScore;
      document.getElementById('result-overlay').classList.add('show');
    }
  }
</script>
</body>
</html>
